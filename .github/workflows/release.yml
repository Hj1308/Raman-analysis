name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests before release
        run: python -m pytest tests/ -v --tb=short

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME}
          # Extract the section for this version from README changelog
          python - <<'EOF'
          import re, os, sys
          version = os.environ.get('GITHUB_REF_NAME', '')
          with open('README.md') as f:
              content = f.read()
          # Match the changelog section for this version
          pattern = rf'### {re.escape(version)}.*?(?=\n### |\n## |$)'
          match = re.search(pattern, content, re.DOTALL)
          notes = match.group(0).strip() if match else f'Release {version}'
          with open('release_notes.md', 'w') as f:
              f.write(notes)
          print(notes)
          EOF
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Raman Spectrum Analyzer ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
